services:
  backend:
    image: fuzhouxing/portfolio-lab-backend:v1.0.0
    container_name: portfolio-lab-backend
    restart: unless-stopped
    ports:
      - "8030:8000"
    environment:
      APP_ENV: "prod"
      API_PREFIX: "/api/v1"
      POSTGRES_DSN: "postgresql+psycopg://portfolio:portfolio@postgres:5432/portfolio_lab"
      REDIS_URL: "redis://redis:6379/0"
      DATASET_VERSION: "current"
      CACHE_DEFAULT_TTL_SECONDS: "604800"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - portfolio_net

  postgres:
    image: postgres:15-alpine
    container_name: portfolio-lab-postgres
    restart: unless-stopped
    ports:
      - "8031:5432"
    environment:
      POSTGRES_DB: "portfolio_lab"
      POSTGRES_USER: "portfolio"
      POSTGRES_PASSWORD: "portfolio"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio_lab"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - portfolio_net

  redis:
    image: redis:7-alpine
    container_name: portfolio-lab-redis
    restart: unless-stopped
    ports:
      - "8033:6379"
    command:
      [
        "redis-server",
        "--appendonly", "no",
        "--save", "",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "allkeys-lru"
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - portfolio_net

  frontend:
    image: fuzhouxing/portfolio-lab-frontend:v1.0.1
    container_name: portfolio-lab-frontend
    restart: unless-stopped
    ports:
      - "8032:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - portfolio_net

networks:
  portfolio_net:
    driver: bridge

volumes:
  pg_data:
